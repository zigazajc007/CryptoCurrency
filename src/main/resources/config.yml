#----------------------------------------------------------
#                        Config
#----------------------------------------------------------
# Players will see messages in default language (Default is English) - Available options: English, Russian, Spanish.
# If you translate plugin into any other language feel free to send it and I will include it into this plugin.
default_language: "English"
# Money decimal format
money_format: "##,##0.00"
# From what crypto exchange, do you want to pull prices (Default is 1)
# 1 = Rabbit Forex (Aggregated from: Binance, Kraken, Gate, KuCoin, BingX, ByBit, Crypto.com, Bitfinex)
# 2 = Coinbase
# 3 = Binance
crypto_exchange: 1
# You can choose between: (Works with Rabbit Forex and Coinbase exchange)
#
# AED AFN ALL AMD ANG AOA ARS AUD AWG AZN BAM BBD BDT BGN BHD BIF BMD BND BOB BRL
# BSD BTN BWP BYN BZD CAD CDF CHF CLP CNH CNY COP CRC CUC CUP CVE CZK DJF DKK DOP
# DZD EGP ERN ETB EUR FJD FKP GBP GEL GGP GHS GIP GMD GNF GTQ GYD HKD HNL HRK HTG
# HUF IDR ILS IMP INR IQD IRR ISK JEP JMD JOD JPY KES KGS KHR KMF KPW KRW KWD KYD
# KZT LAK LBP LKR LRD LSL LYD MAD MDL MGA MKD MMK MNT MOP MRU MUR MVR MWK MXN MYR
# MZN NAD NGN NIO NOK NPR NZD OMR PAB PEN PGK PHP PKR PLN PYG QAR RON RSD RUB RWF
# SAR SBD SCR SDG SEK SGD SHP SLE SLL SOS SRD STN SVC SYP SZL THB TJS TMT TND TOP
# TRY TTD TWD TZS UAH UGX USD UYU UZS VEF VES VND VUV WST XAF XCD XCG XOF XPF YER
# ZAR ZMW ZWG ZWL
#
api_currency: "USD"
# After how many seconds plugin will fetch data from exchange again (Gets crypto values)
price_fetch: 30
# After how many seconds plugin will calculate supply again
supply_calculator: 60
# Do you want to monitor prices of cryptocurrencies?
monitor_history: true
# Cryptocurrency mining; mining.yml
mining: true
#----------------------------------------------------------
#                        SignShop
#          Only works on newer MC server versions
#----------------------------------------------------------
shop_enabled: true

shop_buy_format: "[cbuy]"
shop_buy_success: "&0[&1cbuy&0]"
shop_buy_error: "&0[&ccbuy&0]"
shop_buy_amount_color: "&0"
shop_buy_material_color: "&0"

shop_sell_format: "[csell]"
shop_sell_success: "&0[&1csell&0]"
shop_sell_error: "&0[&ccsell&0]"
shop_sell_amount_color: "&0"
shop_sell_material_color: "&0"

shop_disabled_material:
  - "firework_rocket"
#----------------------------------------------------------
#                    Admin SignShop
#----------------------------------------------------------
admin_shop_buy_format: "[abuy]"
admin_shop_buy_success: "&0[&1cbuy&0]"
admin_shop_buy_error: "&0[&ccbuy&0]"
admin_shop_buy_amount_color: "&0"
admin_shop_buy_material_color: "&0"

admin_shop_sell_format: "[asell]"
admin_shop_sell_success: "&0[&1csell&0]"
admin_shop_sell_error: "&0[&ccsell&0]"
admin_shop_sell_amount_color: "&0"
admin_shop_sell_material_color: "&0"
#----------------------------------------------------------
#                        Placeholders
#----------------------------------------------------------
price_rising: "&a▲"
price_falling: "&c▼"

percentage_rising: "&a+"
percentage_falling: "&c-"
#----------------------------------------------------------
#                        Bungeecord
#----------------------------------------------------------
# Do you want to use mysql database?
mysql: false
# Here are all data for connection to Mysql database. Please create database, user and password by yourself. Do not use root as user, because of security risk!
mysql_host: "localhost"
mysql_port: "3306"
mysql_database: "CryptoCurrency"
mysql_user: "root"
mysql_password: ""
mysql_useSSL: false